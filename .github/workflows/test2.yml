name: Build OpenWrt Toolchain - test2

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  # 明确定义种子配置文件变量
  SEED_CONFIG: seed.config
  # 引入 DIY 脚本变量
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build_toolchain:
    runs-on: ubuntu-22.04
    steps:
      - name: Remove all docker images
        run: |
         images=$(docker images -q)
         if [ -n "$images" ]; then
           docker rmi $images
         else
           echo "No images to remove."
         fi
         
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
             # this might remove tools that are actually needed,
             # if set to "true" but frees about 6 GB
             tool-cache: true
             # all of these default to true, but feel free to set to
             # "false" if necessary for your workflow
             android: true
             dotnet: true
             haskell: true
             large-packages: true
             swap-storage: true
             
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo -E apt update
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Clone source code
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

# --- 关键修正：执行 DIY-P1 以引入 helloworld 等 feeds ---
      - name: Load Custom Feeds
        run: |
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -f libxcrypt

      # --- 第一步：根据 seed.config 生成完整 .config 并导出变量 ---
      - name: Generate Full Config & Export Env
        id: parse_config
        run: |
          cd openwrt
          [ -e ../seed.config ] && cp ../seed.config .config
          make defconfig

      # --- 核心步骤：恢复 Toolchain 缓存 ---
      - name: Restore Toolchain Cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/host   # <--- 极其重要：存放编译过程标记和宿主工具中间件
            openwrt/build_dir/toolchain-* # <--- 存放交叉编译器编译过程
            # ~/.ccache # 如果你开启了 ccache，保留它没问题
          # 【注意】这里的 Key 必须和你 toolchain.yml 中的完全一致
          key: ${{ runner.os }}-toolchain-testv1
          restore-keys: |
            ${{ runner.os }}-toolchain-testv1

      - name: Revive Toolchain and Environment
        run: |
          cd openwrt
          echo ">>> [1/3] 正在对齐时间戳，防止触发重编..."
          # 这一步能欺骗 make，让它以为这些文件是刚刚在本地生成的
          find staging_dir build_dir/host -exec touch {} + 2>/dev/null || true
          
          echo ">>> [2/3] 正在修复潜在的软链接断裂..."
          # 针对交叉编译器的 bin 目录进行一次简单的软链接自检
          # 有时 tar 会把绝对路径链接搞挂，这里可以强制让 feeds 重连一部分
          ./scripts/feeds update -i
          ./scripts/feeds install -a
          
          echo ">>> [3/3] 重新生成符号索引..."
          # 必须执行一次 defconfig，确保 .config 与恢复的工具链状态对齐
          [ -e $GITHUB_WORKSPACE/seed.config ] && cp $GITHUB_WORKSPACE/seed.config .config
          make defconfig
      - name: Verify Toolchain Health
        run: |
          cd openwrt
          # 寻找交叉编译器二进制文件，尝试运行 --version
          COMPILER=$(find staging_dir/toolchain-* -name "*gcc" -type f | head -n 1)
          if [ -z "$COMPILER" ] || ! $COMPILER --version; then
            echo "❌ 错误：工具链缓存恢复失败或编译器无法运行！"
            exit 1
          else
            echo "✅ 工具链状态良好: $($COMPILER --version | head -n 1)"
          fi
          
      - name: Universal Plugin Pre-compile (Rust & Go Optimized)
        run: |
          cd openwrt
          
          # 1. 必须运行一次：确保内核头文件和核心工具链对齐
          # 只要缓存恢复了，这一步会非常快（检查型编译）
          echo ">>> 同步内核环境与编译工具..."
          make target/compile -j$(nproc)
          
          KEYWORDS="shadowsocks sing-box xray docker wireguard samba tailscale"
          
          for KEY in $KEYWORDS; do
              # 找出所有开启的 CONFIG
              SELECTED_PKGS=$(grep "^CONFIG_PACKAGE_.*$KEY.*=y" .config | cut -d'=' -f1 | sed 's/CONFIG_PACKAGE_//')
              if [ -z "$SELECTED_PKGS" ]; then continue; fi

              for PKG in $SELECTED_PKGS; do
                  echo ">>> 正在分析包: $PKG"
                  
                  # --- 核心改进：处理 Rust/Go 的子包命名习惯 ---
                  # 去掉常见的后缀，尝试定位真实的主 Makefile 目录
                  BASE_NAME=$(echo "$PKG" | sed 's/-sslocal//; s/-ssserver//; s/-redir//; s/-ss-local//; s/-ss-redir//')
                  
                  # 尝试通过 PKG_NAME 变量精准查找
                  MAKEFILE_FILE=$(grep -rlE "PKG_NAME:=($PKG|$BASE_NAME)" package feeds 2>/dev/null | head -n 1)
                  
                  if [ -n "$MAKEFILE_FILE" ]; then
                      PKG_PATH=$(dirname "$MAKEFILE_FILE")
                      echo ">>> 精准命中路径: $PKG_PATH"
                      
                      # 执行编译。如果这个包是 Rust 写的，它会自动触发编译系统的 cargo 流程
                      # 我们在这里加上日志 V=s 方便你在报错时看到具体是 Cargo 还是 GCC 的问题
                      make "$PKG_PATH/compile" -j$(nproc) || make "$PKG_PATH/compile" -j1 V=s || echo "!!! $PKG 编译彻底失败"
                  else
                      # 最后的保底：尝试目录搜索
                      PKG_PATH=$(find package feeds -name "$BASE_NAME" -type d -print -quit)
                      if [ -n "$PKG_PATH" ]; then
                          echo ">>> 目录匹配命中: $PKG_PATH"
                          make "$PKG_PATH/compile" -j$(nproc) || echo "!!! $PKG 编译失败"
                      else
                          echo ">>> [警告] 依旧无法找到 $PKG 的 Makefile 来源"
                      fi
                  fi
              done
          done

      - name: Final Tools Install
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd openwrt
          make tools/install -j$(nproc) || make tools/install -j1 V=s

# --- 第一步：整理需要缓存的文件 (可选) ---
      # 如果你想缓存编译好的固件 bin 目录，可以根据需要调整路径
      - name: Prepare Bin for Cache
        run: |
          # 这一步不是必须的，但如果你想给 v3 瘦身，可以把无用的临时文件删掉
          echo "准备保存 v3 缓存..."

      # --- 第二步：保存为 v3 缓存 ---
      - name: Save Firmware Cache v3
        uses: actions/cache/save@v4
        with:
          path: |
            openwrt/bin
            openwrt/staging_dir
            ~/.ccache
          # 给它起个新名字 v3，并加上 hash 保证唯一性
          key: ${{ runner.os }}-pre-compile-v1-${{ github.run_id }}
