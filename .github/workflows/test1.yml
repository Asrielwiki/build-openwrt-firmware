name: Build OpenWrt Toolchain - test1

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  # 明确定义种子配置文件变量
  SEED_CONFIG: seed.config
  # 引入 DIY 脚本变量
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build_toolchain:
    runs-on: ubuntu-22.04
    steps:
      - name: Remove all docker images
        run: |
         images=$(docker images -q)
         if [ -n "$images" ]; then
           docker rmi $images
         else
           echo "No images to remove."
         fi
         
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
             # this might remove tools that are actually needed,
             # if set to "true" but frees about 6 GB
             tool-cache: true
             # all of these default to true, but feel free to set to
             # "false" if necessary for your workflow
             android: true
             dotnet: true
             haskell: true
             large-packages: true
             swap-storage: true
             
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo -E apt update
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Clone source code
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

# --- 关键修正：执行 DIY-P1 以引入 helloworld 等 feeds ---
      - name: Load Custom Feeds
        run: |
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -f libxcrypt

      # --- 第一步：根据 seed.config 生成完整 .config 并导出变量 ---
      - name: Generate Full Config & Export Env
        id: parse_config
        run: |
          cd openwrt
          [ -e ../seed.config ] && cp ../seed.config .config
          make defconfig

      # --- 第二步：尝试恢复缓存 ---
      - name: Cache Toolchain & ccache
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/host
            openwrt/build_dir/toolchain-*
            openwrt/build_dir/target-*
            openwrt/dl
            ~/.ccache
          key: ${{ runner.os }}-toolchain-testv2

      - name: Build Toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd openwrt
          # 编译基础工具链
          echo ">>> 正在执行编译基础工具链..."
          make tools/install -j$(nproc)
          make toolchain/install -j$(nproc)

          # 强制执行 Go 宿主编译器编译
          echo ">>> 正在执行 Go 宿主编译器编译..."
          make package/feeds/packages/golang/host/compile V=s -j$(nproc)

          # 强制执行 Rust 宿主编译器编译
          # 注意：先通过 find 确定路径，防止不同源码仓库路径不一致
          echo ">>> 正在执行 Rust 宿主编译器编译..."
          # 我们找包含 "lang/rust" 且有 Makefile 的目录
          RUST_DIR=$(find package/feeds/ -name "Makefile" | grep "lang/rust/Makefile" | sed 's/Makefile//' | head -n 1)

          if [ -z "$RUST_DIR" ]; then
              echo "致命错误：在所有 feed 中都找不到 Rust 源码！"
              # 尝试直接点名 shadowsocks-rust，让它自动拉取依赖
              make package/feeds/small/shadowsocks-rust/host/compile -j1 V=s || echo "尝试 ss-rust 引导失败"
          else
              echo "找到 Rust 路径: $RUST_DIR"
              # 执行动态找到的路径
              make ${RUST_DIR}host/compile -j1 V=s
          fi

          echo ">>> 正在填补核心链接库 (libc/libatomic)..."
          # 预编译基础库，解决 90% 的动态链接报错
          make package/libs/toolchain/compile -j$(nproc)
          make package/libs/libatomic/compile -j$(nproc)

          echo ">>> ----------------------------------------------------"
          echo ">>> [环境审计] 最终地基完整性检查报告："
          
          # 检查 Host 工具
          [ -f staging_dir/host/bin/go ] && echo "✅ Go 编译器: 就绪" || echo "❌ Go 编译器: 缺失"
          [ -f staging_dir/host/bin/cargo ] && echo "✅ Rust 编译器: 就绪" || echo "❌ Rust 编译器: 缺失"
          
          # 检查 关键库中间件
          [ -d build_dir/target-*/toolchain ] && echo "✅ Libc 中间件: 已生成" || echo "❌ Libc 中间件: 缺失"
          [ -d build_dir/target-*/libatomic ] && echo "✅ Libatomic 中间件: 已生成" || echo "❌ Libatomic 中间件: 缺失"
          
          # 检查 内核环境
          [ -d build_dir/target-*/linux-x86_64/linux-* ] && echo "✅ 内核头文件: 已对齐" || echo "❌ 内核头文件: 缺失"
          echo ">>> ----------------------------------------------------"
