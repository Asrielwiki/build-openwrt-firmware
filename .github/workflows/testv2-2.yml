name: Build OpenWrt Toolchain - testv2-2

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  # 明确定义种子配置文件变量
  SEED_CONFIG: seed.config
  # 引入 DIY 脚本变量
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_BIN_DIR: false
  TZ: Asia/Shanghai

jobs:
  build_toolchain:
    runs-on: ubuntu-22.04
    steps:
      - name: Remove all docker images
        run: |
         images=$(docker images -q)
         if [ -n "$images" ]; then
           docker rmi $images
         else
           echo "No images to remove."
         fi
         
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
             # this might remove tools that are actually needed,
             # if set to "true" but frees about 6 GB
             tool-cache: true
             # all of these default to true, but feel free to set to
             # "false" if necessary for your workflow
             android: true
             dotnet: true
             haskell: true
             large-packages: true
             swap-storage: true
             
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean

          sudo -E apt update
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Clone source code
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

# --- 关键修正：执行 DIY-P1 以引入 helloworld 等 feeds ---
      - name: Load Custom Feeds
        run: |
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -f libxcrypt

      # --- 核心步骤：恢复 Toolchain 缓存 ---
      - name: Restore Toolchain Cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/host
            openwrt/build_dir/toolchain-*
            openwrt/build_dir/target-*
            openwrt/dl
            ~/.ccache
          key: ${{ runner.os }}-toolchain-test2
          restore-keys: |
            ${{ runner.os }}-toolchain-test2

      - name: 恢复缓存后立即强制释放空间
        run: |
          # 1. 强行清理 GitHub Actions 下载缓存的临时归档目录（卸磨杀驴）
          sudo rm -rf /home/runner/runners/*/externals/
          sudo rm -rf /home/runner/.cache/*
          
          # 2. 清理 Linux 系统的 apt 缓存和各种无用日志
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          
          # 3. 现场执行一次内存与磁盘缓存同步释放
          sudo sync && echo 3 | sudo tee /proc/sys/vm/drop_caches

      - name: Prepare and Warm-up Environment
        run: |
          cd openwrt
          
          echo ">>> [1/4] 唤醒地基：对齐时间戳..."
          # 必须最先执行，防止接下来的 make defconfig 触发重编
          find staging_dir build_dir/host build_dir/toolchain-* -exec touch {} + 2>/dev/null || true
          
          echo ">>> [2/4] 修复链接：同步 Feeds 索引..."
          # 使用 -i 锁定版本，install -a 重建 package/feeds/ 下的软链接
          ./scripts/feeds update -i
          ./scripts/feeds install -a
          
          echo ">>> [3/4] 同步配置：执行 defconfig..."
          [ -e $GITHUB_WORKSPACE/seed.config ] && cp $GITHUB_WORKSPACE/seed.config .config
          make defconfig
          # 强行把这个开关塞进 .config，编译引擎启动时会自动识别并生效
          echo "CONFIG_CLEAN_IPKG=y" >> .config

          echo ">>> [4/4] 正在处理Toolchain 缓存..."
          if [ -d "staging_dir" ]; then
              echo ">>> 检测到 Toolchain 缓存，开始同步时间戳..."
              
              # 刷新所有编译完成的隐藏标记文件（.built_*）
              find staging_dir/ -name ".built*" -exec touch {} + 2>/dev/null || true
              find build_dir/ -name ".built*" -exec touch {} + 2>/dev/null || true
              
              # 刷新 OpenWrt 核心状态戳记（stamps 文件夹）
              # 这些 stamps 是 OpenWrt 判断“这一步到底有没有做过”的绝对依据
              [ -d "staging_dir/toolchain/stamp" ] && touch staging_dir/toolchain/stamp/* staging_dir/toolchain/stamp/.* 2>/dev/null || true
              [ -d "staging_dir/host/stamp" ]      && touch staging_dir/host/stamp/* staging_dir/host/stamp/.* 2>/dev/null || true
              [ -d "staging_dir/hostpkg/stamp" ]   && touch staging_dir/hostpkg/stamp/* staging_dir/hostpkg/stamp/.* 2>/dev/null || true
              [ -d "build_dir/toolchain/stamp" ]   && touch build_dir/toolchain/stamp/* build_dir/toolchain/stamp/.* 2>/dev/null || true
              
              echo ">>> 时间戳欺骗完成！"
          else
              echo ">>> 警告：没有发现 staging_dir 缓存，将触发全量重编！"
          fi

      - name: Compile Firmware
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1 ./ --exclude=build_dir --exclude=bin
          du -h --max-depth=1 ./build_dir
          du -h --max-depth=1 ./bin
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Organize Firmware
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        if: env.UPLOAD_BIN_DIR == 'true'
        with:
            name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
            path: openwrt/bin

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          retention-days: 3
