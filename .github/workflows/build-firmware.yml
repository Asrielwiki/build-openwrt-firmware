name: Build OpenWrt Firmware (Cached)

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  SEED_CONFIG: seed.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Remove all docker images
      run: |
        images=$(docker images -q)
        if [ -n "$images" ]; then
          docker rmi $images
        else
          echo "No images to remove."
        fi
  
    - name: Space cleanup and Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        #docker rmi `docker images -q`
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
        sudo -E apt-mark hold grub-efi-amd64-signed
        sudo -E apt update
        sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
        sudo -E apt -y full-upgrade
        sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E systemctl daemon-reload
        sudo -E apt -y autoremove --purge
        sudo -E apt clean
        sudo -E timedatectl set-timezone "Asia/Shanghai"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Checkout OpenWrt
      uses: actions/checkout@v4

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

# --- 优化点 1：调整克隆与路径逻辑 ---
    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        # 建立软链接，确保 Actions 插件能通过根目录访问到工作区
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # --- 优化点 2：精准恢复路径 ---
    - name: Restore Toolchain & ccache
      id: restore-cache
      uses: actions/cache/restore@v4
      with:
        # 指向软链接后的实际物理路径
        path: |
          /workdir/openwrt/staging_dir/toolchain-*
          /workdir/openwrt/staging_dir/host*
          /workdir/openwrt/staging_dir/target-*
          ~/.ccache
        key: ${{ runner.os }}-toolchain-${{ hashFiles(env.SEED_CONFIG) }}
        restore-keys: |
          ${{ runner.os }}-toolchain-



    - name: Load Custom Feeds
      run: |
        chmod +x $DIY_P1_SH $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        $GITHUB_WORKSPACE/$DIY_P2_SH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        ./scripts/feeds install -f libxcrypt

    - name: Load Custom Config
      run: |
        [ -e $SEED_CONFIG ] && cp $SEED_CONFIG openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        # 基于种子配置补全依赖，此时如果缓存恢复成功，相关插件会识别为已就绪
        make defconfig

    - name: Download Packages
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      id: compile
      run: |
        cd openwrt
        # 强制开启 ccache 并指向恢复后的目录
        export CONFIG_CCACHE=y
        export CCACHE_DIR=$HOME/.ccache
        
        # 增加一个磁盘监控，防止编译到一半断掉
        df -h
        
        make -j$(nproc) || {
          echo "First attempt failed, cleaning up some space..."
          # 如果失败，通常是因为磁盘或内存压力，清理 build_dir 中已完成的临时文件再单线程重试 
          rm -rf build_dir/host 
          make -j1 V=s
        }
        
        echo "status=success" >> $GITHUB_OUTPUT
        
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize Firmware
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Final Space Cleanup
      if: always() # 无论成功失败都执行
      run: |
        # 彻底移除编译目录，防止 GitHub Actions 在上传 Artifact 时扫描过多无关文件
        sudo rm -rf /workdir/openwrt/build_dir
        # 如果不需要下次继续使用这个 Runner 的本地缓存，可以连 dl 也删了
        sudo rm -rf /workdir/openwrt/dl

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 3
