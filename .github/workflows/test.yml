name: Build OpenWrt Toolchain - test

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  # 明确定义种子配置文件变量
  SEED_CONFIG: seed.config
  # 引入 DIY 脚本变量
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build_toolchain:
    runs-on: ubuntu-22.04
    steps:
      - name: Remove all docker images
        run: |
         images=$(docker images -q)
         if [ -n "$images" ]; then
           docker rmi $images
         else
           echo "No images to remove."
         fi
         
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
             # this might remove tools that are actually needed,
             # if set to "true" but frees about 6 GB
             tool-cache: true
             # all of these default to true, but feel free to set to
             # "false" if necessary for your workflow
             android: true
             dotnet: true
             haskell: true
             large-packages: true
             swap-storage: true
             
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo -E apt update
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Clone source code
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

# --- 关键修正：执行 DIY-P1 以引入 helloworld 等 feeds ---
      - name: Load Custom Feeds
        run: |
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -f libxcrypt

      # --- 第一步：根据 seed.config 生成完整 .config 并导出变量 ---
      - name: Generate Full Config & Export Env
        id: parse_config
        run: |
          cd openwrt
          [ -e ../seed.config ] && cp ../seed.config .config
          make defconfig

      # --- 第二步：尝试恢复缓存 ---
      - name: Cache Toolchain & ccache
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir/toolchain-*
            openwrt/staging_dir/host*
            openwrt/staging_dir/target-*
            ~/.ccache
          key: ${{ runner.os }}-toolchain-${{ hashFiles('seed.config') }}

      # --- 第四步：按需预编译（只有缓存失效 且 配置选中 才会执行） ---
      - name: Pre-compile Sing-box & Dependencies
        run: |
          cd openwrt
          # 扩充后的关键词：涵盖了大部分“重型”或“触底”插件
          KEYWORDS="sing-box"

          for KEY in $KEYWORDS; do
              # 查找是否有选中这些关键词的包
              SELECTED_PKGS=$(grep "^CONFIG_PACKAGE_.*$KEY.*=y" .config | cut -d'=' -f1 | sed 's/CONFIG_PACKAGE_//')

              if [ -z "$SELECTED_PKGS" ]; then continue; fi

              for PKG in $SELECTED_PKGS; do
                  PKG_PATH=$(find package feeds -name "$PKG" -type d -print -quit)
        
                  if [ -n "$PKG_PATH" ]; then
                     # --- 深度防御逻辑 ---
                     # 只要是这几类插件，统一先跑一次内核环境同步
                     # 如果之前跑过，这一步是秒过的，不会浪费时间
                     echo ">>> 正在处理底层敏感插件: $PKG"
                     make target/compile -j$(nproc)
            
                     make "$PKG_PATH/compile" -j$(nproc) || echo "$PKG 编译失败，已跳过"
                  fi
              done
          done


#      - name: Pre-compile Xray
#        if: steps.cache-toolchain.outputs.cache-hit != 'true' && steps.parse_config.outputs.HAS_XRAY == 'true'
#        run: |
#          cd openwrt
#          echo "Building Xray-core package..."
#          make package/feeds/custom_repo/xray-core/compile -j$(nproc)

      - name: Final Tools Install
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd openwrt
          make tools/install -j$(nproc) || make tools/install -j1 V=s
